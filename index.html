<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Sentimiento Financiero - Versión Avanzada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            color: #333;
        }
        .card-kpi {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .card-kpi:hover {
            transform: translateY(-2px);
        }
        .dashboard-container {
            padding: 30px;
        }
        .chart-container {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: 320px;
        }
        .table-container {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-height: 400px;
            overflow-y: auto;
        }
        /* Badges estilizados para Sentimiento */
        .badge-positivo { background-color: #d1e7dd; color: #0f5132; padding: 5px 10px; border-radius: 20px; font-size: 0.85em; font-weight: 500; }
        .badge-negativo { background-color: #f8d7da; color: #842029; padding: 5px 10px; border-radius: 20px; font-size: 0.85em; font-weight: 500; }
        .badge-neutral { background-color: #e2e3e5; color: #41464b; padding: 5px 10px; border-radius: 20px; font-size: 0.85em; font-weight: 500; }
        
        /* Ajustes de scrollbar para la tabla */
        .table-container::-webkit-scrollbar { width: 6px; }
        .table-container::-webkit-scrollbar-thumb { background-color: #cccccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container-fluid dashboard-container">
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="fw-bold text-dark m-0">Análisis de Sentimiento de Noticias Financieras</h1>
            <p class="text-muted">Análisis macroeconómico automatizado en tiempo real</p>
        </div>
    </div>
