<script>
  // 1. CARGA DE DATOS DESDE EL REPOSITORIO (noticias.json subido a GitHub)
  fetch('./noticias.json') // Asegurate de guardarlo en la misma carpeta raíz o cambiar la ruta
    .then(response => response.json())
    .then(data => {
      inicializarDashboard(data);
    })
    .catch(error => console.error("Error al cargar el JSON de noticias:", error));

  function inicializarDashboard(noticias) {
    // 2. CÁLCULO AUTOMÁTICO DE KPIs (Solución al problema del cero)
    let totalNoticias = noticias.length;
    let positivos = noticias.filter(n => n.Sentimiento === 'Positivo').length;
    let negativos = noticias.filter(n => n.Sentimiento === 'Negativo').length;
    let neutrales = noticias.filter(n => n.Sentimiento === 'Neutral').length;

    // Actualizamos las tarjetas de la izquierda en el HTML usando sus IDs correspondientes
    // (Asegurate de que los IDs coincidan con los de tus divs/span de KPIs)
    document.getElementById('kpi-total').innerText = totalNoticias;
    document.getElementById('kpi-positivos').innerText = positivos;
    document.getElementById('kpi-negativos').innerText = negativos;
    document.getElementById('kpi-neutrales').innerText = neutrales;

    // 3. RENDERIZADO DE LA TABLA INTERACTIVA (Abajo a la derecha)
    const tablaCuerpo = document.getElementById('tabla-noticias-body'); 
    tablaCuerpo.innerHTML = ''; // Limpiamos marcador estático anterior

    noticias.forEach(noticia => {
      const fila = document.createElement('tr');
      
      // Definimos el color del semáforo según el impacto (Lógica del Color Manager de KNIME)
      let badgeColor = 'bg-secondary'; // Por defecto gris
      let borderColor = 'border-left: 4px solid #gray;';
      
      if (noticia.Inpacto === 'Alto' || noticia.Inpacto === 'High') {
        borderColor = 'border-left: 5px solid #dc3545;'; // Rojo para Alto
      } else if (noticia.Inpacto === 'Medio' || noticia.Inpacto === 'Medium') {
        borderColor = 'border-left: 5px solid #ffc107;'; // Amarillo para Medio
      } else if (noticia.Inpacto === 'Bajo' || noticia.Inpacto === 'Low') {
        borderColor = 'border-left: 5px solid #198754;'; // Verde para Bajo
      }

      // Estructuramos la fila imitando el Table View profesional que lograste
      fila.innerHTML = `
        <td style="${borderColor} font-weight: 500;">${noticia.Titular_Noticia}</td>
        <td><span class="badge-sentimiento ${noticia.Sentimiento.toLowerCase()}">${noticia.Sentimiento}</span></td>
        <td><strong>${noticia.Inpacto}</strong></td>
        <td class="text-muted small">${noticia.Entidad || 'N/A'}</td>
      `;
      
      tablaCuerpo.appendChild(fila);
    });

    // 4. AQUÍ ABAJO PODÉS INYECTAR LAS VARIABLES (positivos, negativos) 
    // EN TUS GRÁFICOS DE BARRAS Y DONA PARA QUE SE ACTUALICEN EN VIVO.
  }
</script>
